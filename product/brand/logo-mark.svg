<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="quackitect mark">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2E6C8"/><stop offset="1" stop-color="#E7D5AE"/>
    </linearGradient>
    <clipPath id="coin"><circle cx="152" cy="156" r="130"/></clipPath>
  </defs>

  <!-- medallion -->
  <circle cx="152" cy="156" r="132" fill="url(#paper)" stroke="#5A4326" stroke-width="3.5"/>
  <circle cx="152" cy="156" r="124" fill="none" stroke="#5A4326" stroke-width="1" opacity="0.4"/>

  <!-- architect's tools in the background (faint), clipped to the coin -->
  <g clip-path="url(#coin)" stroke="#B49A6B" fill="none" opacity="0.7">
    <!-- drafting compass / dividers, opened over the figure -->
    <line x1="152" y1="50" x2="152" y2="40" stroke-width="3.4"/>
    <circle cx="152" cy="56" r="5.5" stroke-width="2.2"/>
    <path d="M150 60 L100 232" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M154 60 L206 230" stroke-width="2.6" stroke-linecap="round"/>
    <path d="M137 98 A 30 30 0 0 0 167 98" stroke-width="1.5"/>
    <path d="M100 232 l-4 10 l9 -2 z" fill="#B49A6B" stroke="none"/>
    <path d="M206 230 l-8 4 l3 8 z" fill="#B49A6B" stroke="none"/>
    <!-- set-square (45°) resting lower-left -->
    <path d="M60 244 L120 244 L60 184 Z" stroke-width="1.6" opacity="0.85"/>
    <!-- base scale with ticks -->
    <g stroke-width="1.3">
      <line x1="84" y1="256" x2="220" y2="256"/>
      <line x1="84" y1="256" x2="84" y2="249"/><line x1="106" y1="256" x2="106" y2="251"/>
      <line x1="128" y1="256" x2="128" y2="251"/><line x1="152" y1="256" x2="152" y2="248"/>
      <line x1="174" y1="256" x2="174" y2="251"/><line x1="196" y1="256" x2="196" y2="251"/>
      <line x1="220" y1="256" x2="220" y2="249"/>
    </g>
  </g>

  <!-- the duck, bold ink in front -->
  <g stroke="#5A4326" fill="none" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M72 150
             C70 138 80 132 92 136
             C108 130 126 142 140 150
             C150 118 162 92 184 88
             C205 86 221 99 224 119
             L256 131 L221 147
             C219 158 214 165 208 172
             C224 190 226 208 208 220
             C186 230 146 232 116 227
             C92 223 74 208 70 189
             C68 178 68 162 72 150 Z"/>
    <path d="M110 184 C132 172 158 174 174 186" stroke-width="3.4"/>
  </g>
  <circle cx="196" cy="112" r="6.4" fill="#5A4326"/>
  <circle cx="193.8" cy="109.6" r="2" fill="#F2E6C8"/>
</svg>
